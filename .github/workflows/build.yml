name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/inf-fingerprint-server

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/build.yml'
            server:
              - 'server/**'
              - 'client/Cargo.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/build.yml'

  check:
    runs-on: ubuntu-latest
    concurrency:
      group: check-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p inf-fingerprint --target wasm32-unknown-unknown -- -D warnings
      - run: cargo test --workspace

  client:
    runs-on: ubuntu-latest
    needs: [changes, check]
    if: needs.changes.outputs.client == 'true'
    concurrency:
      group: client-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Derive patch version from commit count so every push to client/**
      # publishes a fresh, monotonically increasing version. Cargo.toml's
      # patch number is just a placeholder; CI is the source of truth.
      - name: Stamp client version
        run: |
          COUNT=$(git rev-list --count HEAD)
          MAJOR_MINOR=$(grep '^version = ' client/Cargo.toml | head -1 | sed 's/version = "\([0-9]*\.[0-9]*\)\..*"/\1/')
          NEW="${MAJOR_MINOR}.${COUNT}"
          sed -i "/^\[package\]\$/,/^\[/{s/^version = \".*\"\$/version = \"${NEW}\"/;}" client/Cargo.toml
          echo "stamped client version: ${NEW}"
          grep '^version' client/Cargo.toml | head -1

      - run: wasm-pack build client --target web --release

      - name: Bundle size
        run: |
          ls -lh client/pkg/
          for f in client/pkg/*.wasm client/pkg/*.js; do
            size=$(wc -c <"$f")
            gz=$(gzip -c "$f" | wc -c)
            printf '%s | %s B (%s B gz)\n' "$(basename "$f")" "$size" "$gz" >> $GITHUB_STEP_SUMMARY
          done

      - uses: actions/upload-artifact@v4
        with:
          name: pkg
          path: client/pkg/
          retention-days: 7

  publish-npm:
    runs-on: ubuntu-latest
    needs: [changes, client]
    if: needs.changes.outputs.client == 'true' && github.event_name == 'push'
    concurrency:
      group: publish-npm-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pkg
          path: pkg

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish if version is new
        working-directory: pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Checking $PKG_NAME@$PKG_VERSION"
          if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null | grep -q .; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already on npm; this is a CI re-run of the same commit, skipping publish"
            exit 0
          fi
          npm publish --access public
          echo "::notice::published $PKG_NAME@$PKG_VERSION"

  server-image:
    runs-on: ubuntu-latest
    needs: [changes, check]
    if: needs.changes.outputs.server == 'true' && github.event_name == 'push'
    concurrency:
      group: server-image-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
