<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>inf-fingerprint demo</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "PingFang SC",
            "Microsoft YaHei", "Helvetica Neue", sans-serif;
      max-width: 800px; margin: 16px auto; padding: 0 12px;
    }
    h1 { font-size: 18px; margin: 0 0 8px; }
    h3 { margin: 16px 0 4px; font-size: 14px; }
    .meta { color: #888; margin-bottom: 12px; }
    .visitor-id {
      font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
      font-size: 16px; padding: 8px 12px; background: #0001;
      border-radius: 6px; word-break: break-all; user-select: all;
    }
    pre {
      background: #0001; padding: 12px; border-radius: 6px;
      overflow-x: auto; font-size: 12px;
    }
    button, input[type=text] {
      padding: 8px 12px; margin: 6px 4px 6px 0;
      font: inherit;
      border: 1px solid #888; border-radius: 6px; background: transparent;
      color: inherit;
    }
    button { cursor: pointer; }
    input[type=text] { min-width: 280px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .card { flex: 1 1 240px; background: #0001; padding: 8px 12px; border-radius: 6px; }
    .card h3 { margin: 0 0 4px; font-size: 13px; }
    .badge { display: inline-block; padding: 2px 6px; margin: 2px;
             background: #06c2; border-radius: 4px; font-size: 11px; }
    .match-exact { background: #0c04; padding: 4px 8px; border-radius: 4px; }
    .match-fuzzy { background: #cc04; padding: 4px 8px; border-radius: 4px; }
    .match-ambiguous, .match-new { background: #c004; padding: 4px 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>inf-fingerprint demo</h1>
  <div class="meta">先 <code>wasm-pack build client --target web --release</code>，再用任意静态服务器访问本页。</div>

  <button id="btn-run">采集</button>
  <button id="btn-rerun">再采一次</button>

  <div id="visitor" class="visitor-id">尚未采集</div>

  <h3>本地 visitor_id（前端兜底）</h3>
  <div id="local-summary" class="row"></div>

  <h3>服务端推断</h3>
  <div>
    Endpoint:
    <input id="endpoint" type="text" value="http://localhost:8080/v1/identify" />
    <button id="btn-server">POST 到服务端</button>
  </div>
  <div id="server-result" style="margin-top: 8px;"></div>

  <h3>完整 JSON</h3>
  <pre id="full">—</pre>

  <script type="module">
    import init, { getFingerprint } from "../client/pkg/inf_fingerprint.js";

    let lastVisitorId = null;
    let lastJson = null;

    async function run() {
      await init();
      const fp = await getFingerprint();
      const json = fp.toJSON();
      lastJson = json;

      const visitorEl = document.getElementById("visitor");
      visitorEl.textContent = fp.visitorId;
      if (lastVisitorId && lastVisitorId !== fp.visitorId) {
        visitorEl.style.background = "#f002";
        visitorEl.title = "visitorId 与上次不一致";
      } else {
        visitorEl.style.background = "#0c02";
      }
      lastVisitorId = fp.visitorId;

      renderLocalSummary(json);
      document.getElementById("full").textContent = JSON.stringify(json, null, 2);
    }

    function renderLocalSummary(j) {
      const cn = j.china || {};
      const cards = [
        ["设备", `
          <div>厂商：${cn.device_vendor}</div>
          <div>系统：${cn.system_rom} ${cn.system_version || ""}</div>
        `],
        ["In-App", `
          <div>App：<b>${cn.in_app}</b> ${cn.in_app_version || ""}</div>
          <div>NetType：${cn.volatile?.net_type || "-"}</div>
          <div>X5：${cn.kernel?.x5_tbs || "-"} / XWEB：${cn.kernel?.xweb || "-"}</div>
          <div>小程序：${cn.volatile?.mini_program_env || "-"}</div>
        `],
        ["Bridges", Object.entries(cn.bridges || {})
          .filter(([_, v]) => (typeof v === "object" ? v?.present : v))
          .map(([k]) => `<span class="badge">${k}</span>`).join("") || "无"],
        ["渲染", `
          <div>Canvas：${j.components?.canvas?.hash?.slice(0, 8) || "-"} (stable=${j.components?.canvas?.stable})</div>
          <div>WebGL render：${j.components?.webgl_render?.pixel_hash?.slice(0, 8) || "-"} (stable=${j.components?.webgl_render?.stable})</div>
          <div>Audio：${j.components?.audio?.hash?.slice(0, 8) || "-"} (stable=${j.components?.audio?.stable})</div>
        `],
        ["Integrity", `
          <div>noisy_count: ${j.integrity?.noisy_count}</div>
          <div>ua_consistent: ${j.integrity?.ua_consistent}</div>
        `],
        ["屏幕", `
          <div>${j.components?.screen?.width}×${j.components?.screen?.height} @${j.components?.screen?.device_pixel_ratio}x</div>
        `],
      ];

      document.getElementById("local-summary").innerHTML = cards
        .map(([title, body]) => `<div class="card"><h3>${title}</h3>${body}</div>`)
        .join("");
    }

    async function postToServer() {
      if (!lastJson) {
        alert("先点「采集」");
        return;
      }
      const endpoint = document.getElementById("endpoint").value.trim();
      const out = document.getElementById("server-result");
      out.innerHTML = "POST 中…";
      try {
        const r = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(lastJson),
        });
        if (!r.ok) {
          const t = await r.text();
          out.innerHTML = `<div class="match-new">HTTP ${r.status}: ${t}</div>`;
          return;
        }
        const data = await r.json();
        const cls = `match-${data.match_kind}`;
        out.innerHTML = `
          <div><span class="${cls}">${data.match_kind}</span>
               server visitor_id: <b>${data.visitor_id}</b></div>
          <div>score: ${data.score?.toFixed(2)} · 2nd: ${data.second_score === -Infinity ? "-∞" : data.second_score?.toFixed(2)} · obs: ${data.observation_count}</div>
          <div>drift: ${(data.drift || []).join(", ") || "—"}</div>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
      } catch (e) {
        out.innerHTML = `<div class="match-new">request failed: ${e.message}</div>`;
      }
    }

    document.getElementById("btn-run").addEventListener("click", run);
    document.getElementById("btn-rerun").addEventListener("click", run);
    document.getElementById("btn-server").addEventListener("click", postToServer);
  </script>
</body>
</html>
